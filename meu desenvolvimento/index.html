<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PGR Moda</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--offwhite:#FAF9F6;
--charcoal:#1A1A1A;
--gold:#C9A84C;
--rose:#e8b4b8;
--babyblue:#b9d8ff;
--slate:#4b5563;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'DM Sans',sans-serif;
background:var(--offwhite);
color:var(--charcoal);
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:white;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.logo{
font-family:'Cormorant Garamond',serif;
font-size:28px;
}

.search input{
padding:10px;
width:260px;
border-radius:6px;
border:1px solid #ddd;
}

.cart{
position:relative;
cursor:pointer;
font-size:22px;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:var(--gold);
color:white;
font-size:12px;
padding:3px 7px;
border-radius:20px;
}

/* LAYOUT */

.container{
display:flex;
}

.sidebar{
width:220px;
background:white;
padding:30px 20px;
border-right:1px solid #eee;
}

.category{
padding:10px;
cursor:pointer;
margin-bottom:8px;
border-left:4px solid transparent;
transition:0.3s;
}

.category:hover{
border-left:4px solid var(--gold);
font-weight:500;
}

/* PRODUTOS */

.products{
flex:1;
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-content{
padding:16px;
}

.badge{
font-size:11px;
padding:4px 10px;
border-radius:20px;
color:white;
display:inline-block;
margin-bottom:8px;
}

.feminino{background:var(--rose);}
.masculino{background:var(--slate);}
.infantil{background:var(--babyblue);color:#333;}

.price{
font-weight:600;
margin:8px 0 14px;
}

.btn{
width:100%;
padding:10px;
border:none;
background:var(--gold);
color:white;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#b8963f;
}

/* CARRINHO */

.cart-panel{
position:fixed;
right:-380px;
top:0;
width:380px;
height:100%;
background:white;
box-shadow:-10px 0 40px rgba(0,0,0,0.15);
padding:25px;
transition:0.4s;
display:flex;
flex-direction:column;
}

.cart-panel.open{
right:0;
}

#cartItems{
flex:1;
overflow:auto;
margin-top:15px;
}

/* ITEM */

.cart-item{
display:flex;
align-items:center;
gap:12px;
margin-bottom:16px;
}

.cart-item img{
width:55px;
height:55px;
border-radius:6px;
object-fit:cover;
}

.item-info{
flex:1;
}

.item-name{
font-size:14px;
margin-bottom:6px;
}

.qty{
display:flex;
align-items:center;
gap:6px;
}

.qty button{
width:24px;
height:24px;
border:none;
background:#eee;
cursor:pointer;
border-radius:4px;
}

.remove{
cursor:pointer;
color:red;
font-size:14px;
}

/* FOOTER */

.cart-footer{
border-top:1px solid #eee;
padding-top:15px;
}

.subtotal{
font-weight:600;
margin-bottom:15px;
}

.checkout-btn{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#ccc;
cursor:not-allowed;
font-size:15px;
transition:0.3s;
}

.checkout-btn.active{
background:var(--gold);
cursor:pointer;
color:white;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* CHECKOUT */

.checkout-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.checkout-box{
background:white;
padding:40px;
border-radius:10px;
width:420px;
max-height:80vh;
overflow:auto;
}

.checkout-item{
display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
}

.checkout-item img{
width:50px;
height:50px;
border-radius:6px;
object-fit:cover;
}

.checkout-total{
font-weight:600;
margin-top:20px;
margin-bottom:20px;
}

.confirm-btn{
width:100%;
padding:14px;
background:var(--gold);
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
}

.back-btn{
width:100%;
padding:12px;
border:none;
background:#eee;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<div class="logo">PGR</div>

<div class="search">
<input placeholder="Buscar roupas">
</div>

<div class="cart" onclick="toggleCart()">
🛒
<span class="cart-count" id="cartCount">0</span>
</div>

</header>

<div class="container">

<aside class="sidebar">

<div class="category">Infantil</div>
<div class="category">Masculino</div>
<div class="category">Feminino</div>

</aside>

<main class="products" id="products"></main>

</div>

<!-- CARRINHO -->

<div class="cart-panel" id="cartPanel">

<h2>Carrinho</h2>

<div id="cartItems"></div>

<div class="cart-footer">

<div class="subtotal">
Subtotal: R$ <span id="subtotal">0.00</span>
</div>

<button id="checkoutBtn" class="checkout-btn" onclick="startCheckout()">
Finalizar Compra
</button>

</div>

</div>

<!-- CHECKOUT -->

<div id="checkoutScreen" class="checkout-screen">

<div class="checkout-box">

<h2>Resumo do Pedido</h2>

<div id="checkoutItems"></div>

<div class="checkout-total">
Total: R$ <span id="checkoutTotal">0</span>
</div>

<button class="confirm-btn" onclick="confirmOrder()">
Confirmar Pagamento
</button>

<button class="back-btn" onclick="closeCheckout()">
Voltar
</button>

</div>

</div>

<script>

const products=[
{
id:1,
nome:"Vestido Linho Mediterrâneo",
categoria:"feminino",
preco:189.90,
img:"https://images.unsplash.com/photo-1542060748-10c28b62716f"
},
{
id:2,
nome:"Camisa Oxford Premium",
categoria:"masculino",
preco:149.90,
img:"https://images.unsplash.com/photo-1523381210434-271e8be1f52b"
},
{
id:3,
nome:"Conjunto Kids Verão",
categoria:"infantil",
preco:89.90,
img:"https://images.unsplash.com/photo-1519741497674-611481863552"
}
]

let cart=[]

const productContainer=document.getElementById("products")

products.forEach(p=>{

productContainer.innerHTML+=`

<div class="card">

<img src="${p.img}">

<div class="card-content">

<span class="badge ${p.categoria}">
${p.categoria}
</span>

<h4>${p.nome}</h4>

<div class="price">
R$ ${p.preco.toFixed(2)}
</div>

<button class="btn" onclick="addToCart(${p.id})">
+ Adicionar ao Carrinho
</button>

</div>

</div>

`

})

function addToCart(id){

const item=cart.find(i=>i.id===id)

if(item){
item.qtd++
}else{
const product=products.find(p=>p.id===id)
cart.push({...product,qtd:1,selected:true})
}

renderCart()

}

function renderCart(){

const container=document.getElementById("cartItems")
container.innerHTML=""

let subtotal=0

cart.forEach((item,index)=>{

if(item.selected) subtotal+=item.preco*item.qtd

container.innerHTML+=`

<div class="cart-item">

<input type="checkbox"
${item.selected?"checked":""}
onchange="toggleItem(${index})">

<img src="${item.img}">

<div class="item-info">

<div class="item-name">
${item.nome}
</div>

<div class="qty">

<button onclick="changeQty(${index},-1)">-</button>

<span>${item.qtd}</span>

<button onclick="changeQty(${index},1)">+</button>

</div>

</div>

<div class="remove"
onclick="removeItem(${index})">
🗑
</div>

</div>

`

})

document.getElementById("subtotal").innerText=subtotal.toFixed(2)

document.getElementById("cartCount").innerText=
cart.reduce((a,b)=>a+b.qtd,0)

const btn=document.getElementById("checkoutBtn")

if(subtotal>0){
btn.classList.add("active")
}else{
btn.classList.remove("active")
}

}

function changeQty(index,delta){

cart[index].qtd+=delta

if(cart[index].qtd<=0){
cart.splice(index,1)
}

renderCart()

}

function removeItem(index){

cart.splice(index,1)
renderCart()

}

function toggleItem(index){

cart[index].selected=!cart[index].selected
renderCart()

}

function toggleCart(){

document.getElementById("cartPanel")
.classList.toggle("open")

}

function startCheckout(){

let selected = cart.filter(item => item.selected)

if(selected.length === 0){
alert("Selecione pelo menos um item")
return
}

const container=document.getElementById("checkoutItems")

container.innerHTML=""

let total=0

selected.forEach(item=>{

total+=item.preco*item.qtd

container.innerHTML+=`

<div class="checkout-item">

<img src="${item.img}">

<div>
<div>${item.nome}</div>
<div>${item.qtd}x R$ ${item.preco.toFixed(2)}</div>
</div>

</div>

`

})

document.getElementById("checkoutTotal").innerText=total.toFixed(2)

document.getElementById("checkoutScreen").style.display="flex"

}

function closeCheckout(){
document.getElementById("checkoutScreen").style.display="none"
}

function confirmOrder(){

const orderNumber=Math.floor(Math.random()*1000000)

alert("Pedido #"+orderNumber+" confirmado!")

cart=[]

renderCart()

closeCheckout()

toggleCart()

}

</script>

</body>
</html>
